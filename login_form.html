<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="utf-8">
		<title>Вход</title>
		<link rel="stylesheet" href="koc_styles.css">
		<link rel="icon" type="image/x-icon" href="ph32.png">
		<link rel="stylesheet" type="text/css" href="login_styles.css">
		<script src="login_script.js"></script>
	</head>
	<body>
		<div class="form_main_box">
			<div class="back_button_box"><a href="koc_main.html" class="back_button">Вернуться</a></div>
			<form method="post">
				<div id="entery_title" class="form_title">Вход</div>
				<div id="reg_title" class="form_title no_display">Регистрация</div>
				<div>
					<div>
						<div id="email_box" class="input_title">Почта</div>
						<div><input type="text" name="email"></div>
					</div>
					<div>
						<div id="password_box" class="input_title">Пароль</div>
						<div><input type="password" name="password"></div>
						<div id="forgot_id" class="forgot">я забыл пароль</div>
					</div>
					<div id="password_again_box" class="no_display">
						<div class="input_title">Повторите пароль</div>
						<div><input type="password" name="password_again"></div>
					</div>
				</div>
				<div id="entery_button_box" class="custom_button">
					<button type="submit">Войти</button>
				</div>
				<div id="reg_button_box" onclick="reg_form_show()" class="custom_button">
					<button type="button">Регистрация</button>
				</div>
				<div id="finish_reg_button_box" class="custom_button no_display">
					<button type="submit">Зарегестрироваться</button>
				</div>
			</form>
		</div>
	</body>

</html>
